<style>
  /* Google Fonts */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  /* --- Base --- */
  [v-cloak] { display: none !important; }
  
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: #f3f4f6; /* gray-100 */
    color: #1f2937; /* gray-800 */
  }

  /* --- Custom Scrollbar --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #f1f1f1; 
  }
  ::-webkit-scrollbar-thumb {
    background: #c1c1c1; 
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #a8a8a8; 
  }

  /* --- Transitions --- */
  .modal-enter-active, .modal-leave-active {
    transition: opacity 0.2s ease;
  }
  .modal-enter-from, .modal-leave-to {
    opacity: 0;
  }

  .fade-enter-active, .fade-leave-active {
    transition: opacity 0.15s ease;
  }
  .fade-enter-from, .fade-leave-to {
    opacity: 0;
  }

  /* --- Component Specifics --- */
  
  /* Pivot Table Sticky Headers */
  .pivot-table-container {
    overflow: auto;
    max-height: 70vh;
    border: 1px solid #e5e7eb;
    border-radius: 0.5rem;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  }
  .pivot-table th, .pivot-table td {
    border-right: 1px solid #e5e7eb;
  }
  .pivot-table th:last-child, .pivot-table td:last-child {
    border-right: none;
  }
  .pivot-table th {
    position: sticky;
    top: 0;
    z-index: 10;
    background-color: #f3f4f6; /* gray-100 */
  }
  .pivot-table th:first-child,
  .pivot-table td:first-child {
    position: sticky;
    left: 0;
    z-index: 20;
    background-color: #ffffff;
    border-right: 2px solid #e5e7eb;
  }
  .pivot-table th:first-child {
    z-index: 30; /* Header intersection */
    background-color: #f3f4f6;
  }

  /* Datepicker Customization (Browser Default) */
  input[type="date"]::-webkit-calendar-picker-indicator {
    cursor: pointer;
  }

  /* Mobile Card Actions */
  .mobile-action-btn {
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    font-weight: 500;
    font-size: 0.875rem;
    transition: background-color 0.2s;
  }

  /* --- Summernote Specifics (Replaces Quill Styles) --- */

  /* [FIX] Summernote List Styles (Tailwind Reset Conflict) */
  /* 에디터 내부의 ul, ol 스타일 강제 복구 */
  .note-editable ul {
    list-style-type: disc !important;
    padding-left: 2rem !important;
    margin-top: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .note-editable ol {
    list-style-type: decimal !important;
    padding-left: 2rem !important;
    margin-top: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .note-editable li {
    display: list-item !important; 
  }

  /* [NEW] Custom Badge Style for Mail Template */
  /* em 단위를 사용하여 폰트 크기에 따라 박스 크기 자동 조절 */
  .custom-badge {
    display: inline-block;
    padding: 0.1em 0.3em;
    margin: 0 2px;
    background-color: #e0e7ff; /* indigo-100 */
    color: #4338ca; /* indigo-700 */
    border: 1px solid #c7d2fe; /* indigo-200 */
    border-radius: 4px;
    font-size: 0.85em; /* 부모 폰트 대비 85% 크기 */
    font-weight: bold;
    line-height: 1;
    white-space: nowrap;
    cursor: default;
    user-select: none; /* 드래그 방지 (덩어리 선택 유도) */
    vertical-align: middle;
  }

  /* [FIX] Preview Area List Styles */
  /* 미리보기 영역(.prose)의 리스트 스타일 복구 */
  .prose ul {
    list-style-type: disc;
    padding-left: 1.5em;
    margin-top: 1em;
    margin-bottom: 1em;
  }
  .prose ol {
    list-style-type: decimal;
    padding-left: 1.5em;
    margin-top: 1em;
    margin-bottom: 1em;
  }
  .prose li {
    margin-top: 0.25em;
    margin-bottom: 0.25em;
  }
</style>
