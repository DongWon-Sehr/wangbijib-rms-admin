<script>
  console.log("--- JAVASCRIPT START (Mail Template Logic Refined) ---");

  window.handleGoogleCredential = function (response) {
    const idToken = response.credential;
    
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          // Vue 앱 다시 초기화
          location.reload();
        } else {
          alert(res.message || '접근 권한이 없습니다.');
        }
      })
      .withFailureHandler(err => {
        console.error(err);
        alert('로그인 처리 실패');
      })
      .apiLoginWithGoogle(idToken);
  };

  const { createApp, ref, computed, onMounted, reactive, toRefs, watch, nextTick, getCurrentInstance } = Vue;

  // --- Client-side Utilities ---
  const Util = {
    formatDate: function(value, type) {
      if (!type) type = 'datetime';
      if (!value) return '';
      try {
        const date = new Date(value);
        if (isNaN(date.getTime())) return String(value);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const hh = String(date.getHours()).padStart(2, '0');
        const mm = String(date.getMinutes()).padStart(2, '0');
        
        if (type === 'date') return y + '-' + m + '-' + d;
        if (type === 'time') return hh + ':' + mm;
        if (type === 'kakao') return m + '/' + d + ' ' + hh + ':' + mm;
        return y + '-' + m + '-' + d + ' ' + hh + ':' + mm;
      } catch (e) { return String(value); }
    },
    addDays: function(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    },
    safeChar: function(str, index) {
      if (!index) index = 0;
      if (!str) return '';
      return String(str).charAt(index);
    },
    base64EncodeWebSafe: function(str) {
      return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
  };

  createApp({
    setup() {
      // ============================================================
      // A. STATE DECLARATION
      // ============================================================
      const isLoading = ref(true);
      const loadingMessage = ref('시스템 초기화 중...');
      const isModalLoading = ref(false);
      const appState = ref('initializing');
      const deniedMessage = ref('');
      const currentView = ref('list');
      const syncCountdown = ref(60);
      const isSyncing = ref(false);
      const appElement = document.getElementById('app');
      const BASE_WEBAPP_URL = appElement ? appElement.dataset.appUrl : '';
      
      const isProfileDropdownOpen = ref(false);
      const isMobileMenuOpen = ref(false);
      const logoutUrl = 'https://accounts.google.com/logout';
      const CALENDAR_URL = "https://calendar.google.com/calendar/embed?&wkst=2&ctz=Asia%2FSeoul&hl=ko&title=%EC%99%95%EB%B9%84%EC%A7%91%20%EC%98%88%EC%95%BD%20%EC%BA%98%EB%A6%B0%EB%8D%94&showPrint=0&showTz=0&src=MmZiMTNkYzIyMDczM2Y3Y2U2MWJhMmFiMjM2NmY1YjQ3OWFhMmQyYjhkN2EzNGE3NzZlZWE3YzQyMDcxMjhkY0Bncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZDE4YTZhMTMyNDhkOWE1MTI2N2M4OTgyZTcwNjE3NGI3MDI4YjVjNmFhOGU3NGE5NDUzZDNjOGQ1OWYyOTI1YUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZTZkMzY3NjQ3ZGU5ZTQzODUyYTBlNjE3OTljYmU4N2FjYmMwZjRmYjdhMmJmMTFlMzMyY2RiZTg3NTU1MDZkNEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=OTkxODFlMzc5YjdmZTBkMzY5NjJjODc5MzcyODQ1ZTBkMDBjMmU4YmE4ZWM4ZjNmYTQzZjZhMThkZWVlYjVhYUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=YmE5NmExOGRjZWVjNzZiODcwZWIzYWY5OWM2NjUwOTJmNzA1MGY3M2FlMWM2NDJjZmRmYWVmYmNiYjMzNmYxOUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=YTM4MGRjNTBmMjEyN2RlMmI5MzlmODcxNTU4MzUzMTZjNWQxMDBkNTk4MmZkMTEzZmM3NTI4ZWZhNzlhOGJkMUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23ef6c00&color=%237cb342&color=%238e24aa&color=%239e69af&color=%23ef6c00&color=%23c0ca33";

      const modalState = reactive({
        reservation: false,
        system: false,
        mail: false
      });
      
      const alertModal = reactive({
        isOpen: false, title: '', message: '', isConfirm: false, resolve: null
      });

      // Data Stores
      const currentUser = ref(null);
      const branches = ref([]);
      const reservations = ref([]);
      const users = ref([]);
      const slotMasters = ref([]);
      const slotDefaults = ref([]);
      const slotOverrides = ref([]);
      const mailTemplates = ref([]);
      
      // Active Data for Modals
      const activeReservation = ref(null);
      const activeSystemData = ref(null);
      const originalReservation = ref(null); 
      
      // List Filters
      const today = new Date();
      const yesterday = Util.addDays(today, -1);

      const filterText = ref('');
      const filterStatus = ref('all');
      const filterDeposit = ref('all');
      const filterBranchIds = ref([]);
      const filterDateType = ref('reservation_date'); 
      const filterDateStart = ref(Util.formatDate(yesterday, 'date')); 
      const filterDateEnd = ref(Util.formatDate(today, 'date'));       
      
      const sortKey = ref('reservation_date');
      const sortOrder = ref(1);
      const currentPage = ref(1);
      const itemsPerPage = 15;

      // Settings
      const settingsTab = ref('slot');
      const currentSlotDate = ref(Util.formatDate(new Date(), 'date'));
      const selectedSlotBranchId = ref('');
      const selectedCalendarBranchId = ref('master');
      
      // Modal Local States
      const localData = ref({});
      const localDateTime = reactive({ date: '', time: '' });
      const selectedMailTemplateId = ref('');
      const userBranchIds = ref([]);
      const slotBatchPayload = reactive({ masterId: '', slot: 1, enabled: true, masterSlots: [] });
      const localMailData = ref({});
      const isPreviewMode = ref(false);
      const isEditorFocused = ref(false);
      
      // Pull to Refresh State
      const pullStartY = ref(0);
      const pullMoveY = ref(0);
      const isPulling = ref(false);
      const isRefreshing = ref(false);
      const pullDistance = computed(() => Math.max(0, pullMoveY.value - pullStartY.value));
      const pullThresholdReached = computed(() => pullDistance.value > 80);
      const pullIndicatorHeight = computed(() => isRefreshing.value ? '60px' : Math.min(pullDistance.value, 100) + 'px');
      
      const hasMultiplePages = computed(() => totalPage.value > 1);
      const isGroupReservation = computed(() => (activeReservation.value?.pax || 0) >= 9);
      const hasFilterBranches = computed(() => filterBranchIds.value.length > 0);
      
      const isSlotFull = (branchId, masterId, date) => {
        const val = getSlotValue(branchId, masterId, date);
        return val !== '-' && Number(val) <= 0;
      };
      
      const handleTouchStart = (e) => {
        const el = document.getElementById('mobile-scroll-container');
        if (el && el.scrollTop === 0) {
          pullStartY.value = e.touches[0].clientY;
          pullMoveY.value = e.touches[0].clientY;
          isPulling.value = true;
        }
      };
      
      const handleTouchMove = (e) => {
        if (!isPulling.value) return;
        const currentY = e.touches[0].clientY;
        if (currentY > pullStartY.value) {
          pullMoveY.value = currentY;
          // Optional: prevent default if it interferes, but typically passive true prevents this.
          // e.preventDefault(); 
        } else {
          isPulling.value = false; // scrolling down
        }
      };
      
      const handleTouchEnd = async () => {
        if (!isPulling.value) return;
        if (pullDistance.value > 80 && !isRefreshing.value) {
          isRefreshing.value = true;
          await refreshInitialData();
          isRefreshing.value = false;
        }
        pullStartY.value = 0;
        pullMoveY.value = 0;
        isPulling.value = false;
      };

      const availableKeywords = [
        'customer_name',
        'branch_name_en',
        'pax',
        'reservation_date',
        'reservation_time',
        'deposit_amount',
        'deposit_url'
      ];
      const modalTitle = ref('');

      // ============================================================
      // B. HELPER FUNCTIONS
      // ============================================================
      const runGoogleScript = (funcName, arg1, arg2, arg3) => {
        isLoading.value = true;
        if (!loadingMessage.value) loadingMessage.value = '처리 중...';

        const finalize = () => {
          isLoading.value = false;
          loadingMessage.value = ''; // 여기서 초기화
        };

        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler((res) => {
              finalize();
              if (res.success) resolve(res); else reject(new Error(res.message || "API Error"));
            })
            .withFailureHandler((err) => {
              finalize();
              reject(new Error(err));
            })[funcName](arg1, arg2, arg3);
        });
      };
      
      const runGoogleScriptSilent = (funcName, arg1, arg2, arg3) => {
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler((res) => {
              if (res.success) resolve(res); else reject(new Error(res.message || "API Error"));
            })
            .withFailureHandler((err) => {
              reject(new Error(err));
            })[funcName](arg1, arg2, arg3);
        });
      };

      const showCustomAlert = (title, message) => new Promise(r => { 
        alertModal.title=title; alertModal.message=message; alertModal.isConfirm=false; alertModal.resolve=r; alertModal.isOpen=true; 
      });
      const showCustomConfirm = (title, message) => new Promise(r => { 
        alertModal.title=title; alertModal.message=message; alertModal.isConfirm=true; alertModal.resolve=r; alertModal.isOpen=true; 
      });
      const handleAlertResult = (res) => { 
        if(alertModal.resolve) alertModal.resolve(res); 
        alertModal.isOpen = false; alertModal.resolve = null; 
      };

      const getBranchName = (id) => {
        if (!branchMapKo.value) return '알 수 없음';
        return branchMapKo.value[id] || '알 수 없음';
      };
      const getDepositStatusLabel = (s) => ({'n/a':'미대상','pending':'대기','confirm':'확정','refund':'환불'})[s] || '미대상';
      const getDepositBadgeClass = (s) => ({'n/a':'bg-gray-100 text-gray-700','pending':'bg-amber-100 text-amber-800','confirm':'bg-red-100 text-red-800','refund':'bg-blue-100 text-blue-800'})[s] || 'bg-gray-100';
      const getUserRoleBadge = (r) => ({'admin':'bg-red-700 text-white','manager':'bg-amber-100 text-amber-800','viewer':'bg-gray-200 text-gray-800'})[r] || 'bg-gray-100';

      const createUpdatePayload = (res) => ({
        id: res.id,
        branch_id: res.branch_id,
        customer_name: res.customer_name,
        pax: res.pax, email: res.email, notes: res.notes,
        internal_notes: res.internal_notes,
        deposit_status: res.deposit_status,
        deposit_amount: res.deposit_amount,
        status: res.status,
        visit_date: Util.formatDate(res.reservation_date, 'date'),
        visit_time: Util.formatDate(res.reservation_date, 'time'),
        message_sent_at: res.message_sent_at
      });

      // ============================================================
      // C. COMPUTED PROPERTIES
      // ============================================================
      const branchMapKo = computed(() => branches.value.reduce((m, b) => { m[b.id] = b.branch_name_ko; return m; }, {}));
      const branchMapEn = computed(() => branches.value.reduce((m, b) => { m[b.id] = b.branch_name_en; return m; }, {}));
      
      const slotDefaultsMap = computed(() => {
        const map = {};
        slotDefaults.value.forEach(d => { if(!map[d.branch_id]) map[d.branch_id]={}; map[d.branch_id][d.slot_master_id] = d; });
        return map;
      });
      const slotOverridesMap = computed(() => {
        const map = {};
        slotOverrides.value.forEach(o => {
          const d = Util.formatDate(o.date, 'date');
          if(!map[o.branch_id]) map[o.branch_id]={}; if(!map[o.branch_id][d]) map[o.branch_id][d]={};
          map[o.branch_id][d][o.slot_master_id] = o;
        });
        return map;
      });
      const slotMasterMap = computed(() => slotMasters.value.reduce((m, s) => { m[s.id] = Util.formatDate(s.time, 'time'); return m; }, {}));

      const getSlotTime = (id) => slotMasterMap.value[id] || 'N/A';
      const getSlotInfo = (branchId, masterId, dateStr) => {
        const ov = slotOverridesMap.value[branchId]?.[dateStr]?.[masterId];
        const def = slotDefaultsMap.value[branchId]?.[masterId];
        let val = '-', isOv = false, cls = 'bg-gray-50 text-gray-500';
        if (ov && ov.enabled) { val = ov.slot; isOv = true; cls = 'bg-amber-100 border border-amber-500'; }
        else if (def && def.enabled) { val = def.slot; cls = val > 0 ? 'bg-green-50 border border-green-300' : 'bg-red-50 border border-red-300 text-red-700'; }
        return { value: val, isOverride: isOv, class: cls, isOverrideData: ov };
      };
      const getSlotValue = (b, m, d) => getSlotInfo(b, m, d).value;
      const isSlotOverride = (b, m, d) => getSlotInfo(b, m, d).isOverride;
      const getSlotDisplayClass = (b, m, d) => getSlotInfo(b, m, d).class;

      const slotSettingsBranches = computed(() => {
        if (!branches.value) return [];
        const user = currentUser.value;
        if (!user) return [];
        return branches.value.filter(b => {
          if (b.enabled !== true && String(b.enabled) !== 'true') return false;
          if (user.role === 'admin') return true;
          const allowed = user.allowedBranchIds || [];
          return allowed.includes(b.id);
        });
      });

      const filteredSlotBranches = computed(() => {
        const list = slotSettingsBranches.value;
        if (selectedSlotBranchId.value) {
          return list.filter(b => b.id === selectedSlotBranchId.value);
        }
        return list;
      });

      const activeCalendarId = computed(() => selectedCalendarBranchId.value === 'master' ? 'wangbijib@gmail.com' : branches.value.find(x => x.id === selectedCalendarBranchId.value)?.calendar_id);
      const calendarIframeSrc = computed(() => CALENDAR_URL);

      const filteredReservations = computed(() => { 
        let list = reservations.value || [];
        const text = filterText.value.replace(/\s+/g, '').toLowerCase();
        
        if (text) {
          list = list.filter(res => {
            const name = (res.customer_name || '').replace(/\s+/g, '').toLowerCase();
            const email = (res.email || '').replace(/\s+/g, '').toLowerCase();
            const notes = (res.notes || '').replace(/\s+/g, '').toLowerCase();
            const internal = (res.internal_notes || '').replace(/\s+/g, '').toLowerCase();
            const id = (res.id || '').replace(/\s+/g, '').toLowerCase();
            return name.includes(text) || email.includes(text) || notes.includes(text) || internal.includes(text) || id.includes(text);
          });
        }
        if (filterStatus.value !== 'all') {
          list = list.filter(r => r.status === filterStatus.value);
        }
        if (filterDeposit.value !== 'all') list = list.filter(r => r.deposit_status === filterDeposit.value);
        if (filterBranchIds.value.length) list = list.filter(r => filterBranchIds.value.includes(r.branch_id));
        
        const dateCol = filterDateType.value;
        if (filterDateStart.value) {
          const start = new Date(filterDateStart.value).setHours(0,0,0,0);
          list = list.filter(r => r[dateCol] && new Date(r[dateCol]).getTime() >= start);
        }
        if (filterDateEnd.value) {
          const end = new Date(filterDateEnd.value);
          end.setDate(end.getDate() + 1);
          end.setHours(0,0,0,0);
          list = list.filter(r => r[dateCol] && new Date(r[dateCol]).getTime() < end.getTime());
        }

        const k = sortKey.value;
        const o = sortOrder.value;
        list.sort((a,b) => {
          let va = a[k], vb = b[k];
          if (k.includes('date') || k.includes('_at')) { va = va ? new Date(va).getTime() : 0; vb = vb ? new Date(vb).getTime() : 0; }
          if (typeof va === 'string') va = va.toLowerCase(); if (typeof vb === 'string') vb = vb.toLowerCase();
          if (va == null) va = ''; if (vb == null) vb = '';
          if (va < vb) return -1 * o; if (va > vb) return 1 * o;
          return 0;
        });
        return list;
      });
      
      const totalPage = computed(() => Math.ceil(filteredReservations.value.length / itemsPerPage) || 1);
      const paginatedReservations = computed(() => {
        const start = (currentPage.value - 1) * itemsPerPage;
        return filteredReservations.value.slice(start, start + itemsPerPage);
      });
      
      watch(filteredReservations, () => {
        const maxPage = Math.ceil(filteredReservations.value.length / itemsPerPage) || 1;
        if (currentPage.value > maxPage) currentPage.value = 1;
      });

      // Validation
      const isTimeEmpty = computed(() => !localDateTime.time || localDateTime.time === '');
      const isSelectionInvalid = computed(() => {
        if (isTimeEmpty.value || !localDateTime.date || !activeReservation.value || !activeReservation.value.branch_id) return false;
        if (!slotMasters.value) return false;
        const currentBranchId = activeReservation.value.branch_id;
        const currentDate = localDateTime.date;
        const currentTime = localDateTime.time;
        const original = originalReservation.value;
        if (original && original.branch_id === currentBranchId && 
          Util.formatDate(original.reservation_date, 'date') === currentDate &&
          Util.formatDate(original.reservation_date, 'time') === currentTime) {
          return false;
        }
        const master = slotMasters.value.find(s => Util.formatDate(s.time, 'time') === currentTime);
        if (!master) return false;
        const val = getSlotValue(currentBranchId, master.id, currentDate);
        return val <= 0;
      });
      const isPaxInvalid = computed(() => {
        const p = activeReservation.value?.pax;
        return !p || p < 1 || !Number.isInteger(Number(p));
      });
      const isReservationFormValid = computed(() => !isTimeEmpty.value && !isSelectionInvalid.value && !isPaxInvalid.value);

      // Actions
      const openModal = (type, data = null) => {
        if (data) {
          const cloned = JSON.parse(JSON.stringify(data));
          if (type === 'reservation') {
            activeReservation.value = cloned;
            originalReservation.value = JSON.parse(JSON.stringify(data));
            if (cloned.is_read === false) {
              cloned.is_read = true;
              const listItem = reservations.value.find(r => r.id === cloned.id);
              if (listItem) listItem.is_read = true;
              runGoogleScriptSilent('apiMarkReservationAsRead', cloned.id);
            }
          } else if (type === 'system' || type === 'mail') {
            if (type === 'system' && data.mode === 'batch') {
              const isOverride = data.batchType === 'override';
              const targetDate = data.data.date;
              const branchId = data.data.branch_id; 

              cloned.masterSlots = slotMasters.value.map(m => {
                let slotVal = 0;
                let enabledVal = true;
                const def = slotDefaults.value.find(d => d.branch_id === branchId && d.slot_master_id === m.id);
                
                if (isOverride) {
                  const ov = slotOverrides.value.find(o => o.branch_id === branchId && o.slot_master_id === m.id && Util.formatDate(o.date, 'date') === targetDate);
                  if (ov) {
                    slotVal = ov.slot;
                    enabledVal = ov.enabled;
                  } else {
                    if (def) { slotVal = def.slot; }
                    enabledVal = false;
                  }
                } else {
                  if (def) { 
                    slotVal = def.slot; 
                    enabledVal = def.enabled; 
                  }
                }
                
                return { id: m.id, slot: slotVal, enabled: enabledVal };
              });
            }
            activeSystemData.value = cloned;
          }
        }
        modalState[type] = true;
      };
      
      const closeModal = (type) => {
        modalState[type] = false;
        if (type === 'reservation') { activeReservation.value = null; originalReservation.value = null; }
        if (type === 'system' || type === 'mail') {
           activeSystemData.value = null;
        }
      };

      const setCurrentView = (n) => currentView.value = n;
      const setCurrentViewAndCloseMenu = (n) => { currentView.value = n; isMobileMenuOpen.value = false; };
      const toggleProfileDropdown = (e) => { e.stopPropagation(); isProfileDropdownOpen.value = !isProfileDropdownOpen.value; };
      const toggleMobileMenu = () => { isMobileMenuOpen.value = !isMobileMenuOpen.value; };

      const sortBy = (k) => { if (sortKey.value === k) sortOrder.value *= -1; else { sortKey.value = k; sortOrder.value = 1; } };
      const toggleBranchFilter = (id) => { const idx = filterBranchIds.value.indexOf(id); if (idx > -1) filterBranchIds.value.splice(idx, 1); else filterBranchIds.value.push(id); };
      const isBranchSelected = (id) => filterBranchIds.value.includes(id);
      const clearBranchFilters = () => filterBranchIds.value = [];
      const prevPage = () => { if (currentPage.value > 1) currentPage.value--; };
      const nextPage = () => { if (currentPage.value < totalPage.value) currentPage.value++; };
      const changeSlotDate = (d) => { const dt = new Date(currentSlotDate.value); dt.setDate(dt.getDate() + d); currentSlotDate.value = Util.formatDate(dt, 'date'); };
      
      const markAsReadOnClick = (res) => {
        if (res && res.is_read === false) {
          res.is_read = true;
          runGoogleScriptSilent('apiMarkReservationAsRead', res.id);
        }
      };
      
      const handleInlineStatusChange = async (res, field, newValue) => {
        let confirmMsg = '';
        if (field === 'status') {
          const statusMap = { 'confirm': '예약 확정', 'cancel': '예약 취소', 'pending': '예약 대기' };
          const statusTxt = statusMap[newValue];
          confirmMsg = res.customer_name + ' 님의 예약을 \'' + statusTxt + '\' 상태로 변경하시겠습니까?';
        } else if (field === 'deposit_status') {
          const statusTxt = getDepositStatusLabel(newValue);
          confirmMsg = res.customer_name + ' 님의 예약금 상태를 \'' + statusTxt + '\'(으)로 변경하시겠습니까?';
        }

        markAsReadOnClick(res);
        
        if (await showCustomConfirm('상태 변경', confirmMsg)) {
          let payloadValue = newValue;

          let r;
          if (field === 'status') {
            r = await runGoogleScript('apiUpdateReservationStatus', res.id, payloadValue);
          } else if (field === 'deposit_status') {
            r = await runGoogleScript('apiUpdateDepositStatus', res.id, payloadValue);
          }
          
          if (r.success) {
            res[field] = payloadValue;
            showCustomAlert('성공', '변경되었습니다.');
          } else {
            showCustomAlert('오류', r.message);
            refreshInitialData(true);
          }
        } else { refreshInitialData(true); }
      };

      const generateKakaoMessageData = (res) => {
        try {
          const branch = branches.value.find(b => b.id === res.branch_id);
          const branchNameKo = branch ? branch.branch_name_ko : '알 수 없음';
          const titleBranchName = branchNameKo.replace('왕비집', '').trim();
          const status = res.status;
          const messageSentAt = res.message_sent_at || '';
          let title;
          if (status === 'cancel') title = '🔴 [취소] ' + titleBranchName + ' 예약알림';
          else if (status === 'pending' || !messageSentAt) title = '🟢 [신규] ' + titleBranchName + ' 예약알림';

        span.setAttribute('contenteditable', 'false'); 
        span.setAttribute('data-value', keyword);

        return html.replace(/\[\[(.*?)\]\]/g, (match, kw) => {

        });
      };

      const initSummernote = () => {
        if (typeof $ === 'undefined' || !$.fn.summernote) {

          return;

        if ($('#mail-summernote').next('.note-editor').length > 0) {
          $('#mail-summernote').summernote('destroy');

        $('#mail-summernote').summernote({
          height: 300,
          lang: 'ko-KR',
          placeholder: '내용을 입력하세요...',
          toolbar: [
            ['style', ['style']],
            ['font', ['bold', 'italic', 'underline', 'clear']],
            ['color', ['color']],
            ['para', ['ul', 'ol', 'paragraph']],
            ['table', ['table']],
            ['insert', ['link', 'hr']],

            onFocus: () => { isEditorFocused.value = true; },
            onBlur: () => { isEditorFocused.value = false; },
            // 키 입력 감지 (Auto-Detect)
            onKeyup: function(e) {
              // [BUGFIX] Enter 키(13) 입력 시 빈 뱃지(empty span.custom-badge) 제거
              if (e.keyCode === 13) {
                const $editable = $(e.target).closest('.note-editable');
                if ($editable.length) {
                  $editable.find('.custom-badge').each(function() {
                    // 텍스트가 비어있거나 공백만 있는 경우 제거
                    if ($(this).text().trim() === '') {
                      $(this).remove();
                    }
                  });
                }
              }

              if (e.keyCode === 32 || e.keyCode === 13) {
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                  const range = selection.getRangeAt(0);
                  const textNode = range.endContainer;
                  if (textNode.nodeType === 3) {
                    const textContent = textNode.textContent;
                    const regex = /\[\[([a-zA-Z0-9_]+)\]\]\s$/;
                    const match = textContent.match(regex);
                    if (match) {
                      const keyword = match[1];
                      const newText = textContent.replace(regex, '');
                      textNode.textContent = newText;
                      const badge = createBadgeNode(keyword);
                      range.insertNode(badge);
                      const space = document.createTextNode('\u00A0');
                      range.insertNode(space);
                      range.setStartAfter(space);
                      range.setEndAfter(space);
                      selection.removeAllRanges();
                      selection.addRange(range);
                    }
                  }
                }
              }
            }
          }
        });
        
        let initialHtml = localMailData.value.body_html || '';

          } else {
            filterDateType.value = 'booking_request_date'; filterDateStart.value = yesterdayStr; filterDateEnd.value = todayStr;
            sortKey.value = 'booking_request_date'; sortOrder.value = -1;
          }

          await refreshInitialData(false);
          appState.value = 'authorized';
          
          window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
              if (isModalLoading.value) return; // 스피너 동작 중일 때 ESC 키 무시
              if (modalState.reservation) closeModal('reservation');
              else if (modalState.system) closeModal('system');
              else if (modalState.mail) closeModal('mail');
            }
          });
          
          setInterval(async () => {
            if (appState.value !== 'authorized' || modalState.system || modalState.mail) return;
            if (isSyncing.value) return;
            
            syncCountdown.value--;
            if (syncCountdown.value <= 0) {
              syncCountdown.value = 60;
              try {
                const res = await runGoogleScriptSilent('apiGetReservations'); 
                if (res.success) {
                  reservations.value = res.data;
                  
                  // [Sync] 모달이 열려있는 경우 해당 예약의 정보(threadId 등)를 업데이트
                  if (modalState.reservation && activeReservation.value) {
                    const freshRes = res.data.find(r => r.id === activeReservation.value.id);
                    if (freshRes && freshRes.email_thread_id && !activeReservation.value.email_thread_id) {
                      activeReservation.value.email_thread_id = freshRes.email_thread_id;
                      console.log(`[Sync] Updated threadId for active modal: ${freshRes.email_thread_id}`);
                    }
                  }
                }
              } catch (e) { console.warn("Sync failed", e); }
            }
          }, 1000);
        } catch(e) { console.error(e); alert('초기화 오류: ' + e.message); } finally { if(appState.value !== 'initializing') isLoading.value = false; }
      };

      onMounted(() => { initApp(); document.addEventListener('click', () => isProfileDropdownOpen.value = false); });

      return {
        pullDistance, isPulling, isRefreshing, handleTouchStart, handleTouchMove, handleTouchEnd,
        pullThresholdReached, pullIndicatorHeight, hasMultiplePages, isGroupReservation,
        isLoading, loadingMessage, appState, deniedMessage, currentView, currentUser, isModalLoading, syncCountdown, isSyncing,
        isProfileDropdownOpen, isMobileMenuOpen, logoutUrl, modalState, alertModal,
        activeReservation, activeSystemData,
        reservations, branches, users, mailTemplates, slotMasters, slotDefaults, slotOverrides,
        filterText, filterStatus, filterDeposit, filterBranchIds, filterDateType, filterDateStart, filterDateEnd,
        sortKey, sortOrder, currentPage, itemsPerPage,
        settingsTab, currentSlotDate, selectedSlotBranchId, selectedCalendarBranchId,
        filteredReservations, paginatedReservations, totalPage, branchMapKo, branchMapEn, slotSettingsBranches, filteredSlotBranches,
        activeCalendarId, calendarIframeSrc, slotMasterMap,
        setCurrentView, setCurrentViewAndCloseMenu, toggleProfileDropdown, toggleMobileMenu, 
        runGoogleScript, openModal, closeModal, showCustomAlert, showCustomConfirm, handleAlertResult,
        refreshInitialData, handleManualRefresh, formatDate: Util.formatDate,
        getBranchName, getDepositStatusLabel, getDepositBadgeClass, sortBy, toggleBranchFilter, isBranchSelected, clearBranchFilters,
        handleInlineStatusChange, sendKakao, confirmKakao, markAsReadOnClick,
        prevPage, nextPage, getUserRoleBadge, confirmDeleteUser, 
        changeSlotDate, getSlotValue, isSlotOverride, getSlotDisplayClass, getSlotTime, getSlotInfo,
        isSlotFull, hasFilterBranches,
        safeChar: Util.safeChar,
        openReservationModal: (r) => openModal('reservation', r),
        openUserModal: (mode, data = null) => openModal('system', { type: 'user', mode, data }),
        openBranchModal: (data) => openModal('system', { type: 'branch', mode: 'edit', data }),
        openSlotEditModal,
        openSlotBatchModal, 
        // [MODIFIED] Added create mode support (null arg)
        openMailTemplateModal: (t = null) => openModal('mail', { type: 'mail', mode: t ? 'edit' : 'create', data: t }),
        localDateTime, selectedMailTemplateId, localData, userBranchIds, slotBatchPayload, localMailData, availableKeywords, modalTitle, 
        isSelectionInvalid, isPaxInvalid, isTimeEmpty, isReservationFormValid,
        handleSaveReservation, sendCustomMail, handleSystemSave, confirmDelete, confirmDeleteMailTemplate, handleMailSave, insertPlaceholder, 
        renderPreview, isPreviewMode, togglePreview,
        BASE_WEBAPP_URL
      };
    }
  }).mount('#app');
</script>
