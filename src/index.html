<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>왕비집 예약관리 시스템</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

  <?!= include('stylesheet'); ?>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.7/kakao.min.js"
    integrity="sha384-tJkjbtDbvoxO+diRuDtwRO9JXR7pjWnfjfRn5ePUpl7e7RJCxKCwwnfqUAdXh53p" crossorigin="anonymous">
  </script>

  <script>
    Kakao.init('efe2c8b08309d34649b1790baf497f6b'); 
    const MY_APP_URL = "<?= pubUrl ?>";
  </script>
</head>

<body>
  <div id="login-screen">
    <h2>왕비집 예약관리 시스템</h2>

    <div class="login-form">
      <div>
        <label for="login-id">아이디</label>
        <input type="text" id="login-id" placeholder="ID를 입력하세요">
      </div>
      <div>
        <label for="passcode">비밀번호</label>
        <input type="password" id="passcode" placeholder="비밀번호">
      </div>
      <p id="login-error"></p>
      <button id="login-btn">로그인</button>
    </div>
  </div>

  <div class="container" id="app-screen" style="display: none;">

    <div class="header">
      <p id="today-date"></p>
      <h1 id="app-title">왕비집 예약관리 시스템</h1>
      <p id="user-info" style="margin-top: 5px;"></p>
    </div>

    <div class="tabs">
      <button class="tab-link active" onclick="showView('list')">예약 리스트</button>
      <button class="tab-link" onclick="showView('calendar')">예약 캘린더</button>
      <button id="settings-tab" class="tab-link admin-only" onclick="showView('settings')">시스템 설정</button>
    </div>

    <div id="app-content">

      <div id="list-view" class="tab-content active">

        <div class="search-bar">
          <div class="custom-select-wrapper">
            <select id="search-mode" class="custom-select" style="min-width: 100px;">
              <option value="visit">방문일</option>
              <option value="request">예약요청일</option>
            </select>
          </div>

          <input type="date" id="start-date">
          <span>~</span>
          <input type="date" id="end-date">
          <button id="search-btn">조회</button>
        </div>

        <div class="filter-bar">
          <div class="branch-filters" id="branch-filters">
            <span class="filter-label">지점</span>
            <span id="branch-badge-container" style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;">
              </span>
          </div>

          <div class="filter-controls">
            <div class="custom-select-wrapper">
              <label for="status-filter">상태</label>
              <select id="status-filter" class="custom-select" onchange="changeStatusFilter(this.value)">
                <option value="all">전체</option>
                <option value="true">예약</option>
                <option value="false">취소</option>
              </select>
            </div>

            <div class="custom-select-wrapper" id="page-size-controls">
              <label for="page-size">보기</label>
              <select id="page-size" class="custom-select" onchange="changePageSize(this.value)">
                <option value="10">10개</option>
                <option value="50">50개</option>
                <option value="100">100개</option>
              </select>
            </div>
          </div>
        </div>

        <div class="list-header-row" id="list-info-bar">
          <div class="total-count" id="total-count-display">
            검색 결과: <strong>0</strong> 건
          </div>
          <div class="pagination-container" id="pagination-top">
          </div>
        </div>

        <div id="card-list-container">
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr id="reservation-table-header">
                <th style="width: 50px;">No.</th>

                <th class="sortable" onclick="handleSort('branch_id')">지점명</th>
                <th class="sortable" onclick="handleSort('visit_date')">방문일</th>
                <th class="sortable" onclick="handleSort('visit_time')">방문시간</th>
                <th class="sortable" onclick="handleSort('customer_name')">이름</th>
                <th>인원</th>
                <th>비고</th>
                <th>이메일</th>

                <th class="sortable" onclick="handleSort('request_date')">예약요청일</th>
                <th class="sortable" onclick="handleSort('status')">상태</th>

                <th id="th-kakao" class="admin-only">카카오톡</th>
              </tr>
            </thead>
            <tbody id="results-table-body"></tbody>
          </table>
        </div>

        <div class="pagination-container" id="pagination-bottom" style="justify-content: center; margin-top: 20px;">
        </div>

      </div>

      <div id="calendar-view" class="tab-content">
        <div class="calendar-container">
          <iframe id="calendar-iframe" src="about:blank" style="border:0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
        </div>
      </div>

      <div id="settings-view" class="tab-content">

        <div id="settings-sidebar-mobile" class="branch-filters"
          style="margin-top: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--color-gray);">
        </div>

        <div id="settings-view-desktop" style="display: flex; gap: 20px;">
          <nav id="settings-sidebar">
            <ul id="settings-sidebar-list">
            </ul>
          </nav>

          <div id="settings-content">
            <div class="settings-header">
              <h2 id="settings-current-table"></h2>
              <button class="action-btn btn-primary" id="admin-add-btn">+ 새로 추가</button>
            </div>

            <div class="table-container" id="admin-table-container"></div>
            <div id="admin-card-list-container" style="display: none;"></div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <div id="edit-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" id="reservation-modal-content">

      <form id="edit-modal-form" style="height: 100%; display: flex; flex-direction: column;">

        <div class="modal-header"
          style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #eee;">
          <h2 id="modal-title" style="margin: 0;">예약 상세 정보</h2>

          <div class="header-actions">
            <div id="modal-btn-group-read" style="display: flex; gap: 8px;">

              <button type="button" class="btn-kakao admin-only" id="btn-modal-kakao">카톡 전송</button>

              <button type="button" class="btn-primary admin-only" id="btn-mode-edit" onclick="enableEditMode()">편집</button>
              <button type="button" class="btn-secondary" onclick="closeEditModal()">닫기</button>
            </div>

            <div id="modal-btn-group-edit" style="display: none; gap: 8px;">
              <button type="submit" class="btn-primary" id="modal-save-btn">저장</button>
              <button type="button" class="btn-secondary" onclick="cancelEditMode()">취소</button>
            </div>
          </div>
        </div>

        <div class="modal-body" style="flex: 1; overflow-y: auto; padding-top: 20px;">
          <input type="hidden" id="modal-row">
          <input type="hidden" id="modal-id">

          <div class="form-group full-width">
            <label for="modal-status">예약상태</label>
            <div class="custom-select-wrapper" style="width: 100%;">
              <select id="modal-status" name="status" class="custom-select" style="width: 100%;" onchange="updateModalStatusColor(this)">
                <option value="true">예약</option>
                <option value="false">취소</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="modal-branch">지점명</label>
            <select id="modal-branch" name="branch">
              <option value="">지점 선택</option>
            </select>
          </div>

          <div class="form-group">
            <label for="modal-name">이름</label>
            <input type="text" id="modal-name" name="customer_name">
          </div>

          <div class="form-group">
            <label for="modal-visitDate">방문일</label>
            <input type="date" id="modal-visitDate" name="visitDate">
          </div>

          <div class="form-group">
            <label for="modal-visitTime">방문시간</label>
            <select id="modal-visitTime" name="visitTime">
              <option value="">시간 선택</option>
            </select>
          </div>

          <div class="form-group">
            <label for="modal-pax">인원</label>
            <input type="number" id="modal-pax" name="pax">
          </div>

          <div class="form-group">
            <label for="modal-email">이메일</label>
            <input type="email" id="modal-email" name="email">
          </div>

          <div class="form-group full-width">
            <label for="modal-notes">비고</label>
            <textarea id="modal-notes" name="notes" rows="3" style="resize: vertical;"></textarea>
          </div>

          <div class="form-group">
            <label for="modal-requestDate">예약요청일</label>
            <input type="text" id="modal-requestDate" name="requestDate" readonly>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="admin-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="admin-modal-title"></h2>
        <button class="btn-secondary" onclick="closeAdminModal()">취소</button>
      </div>
      <form id="admin-modal-form">
        <input type="hidden" id="admin-modal-id">
        <div class="modal-body" id="admin-modal-form-fields">
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn-primary" id="admin-modal-save-btn">저장</button>
        </div>
      </form>
    </div>
  </div>


  <div id="spinner-overlay" style="display: flex;">
    <div class="spinner"></div>
  </div>


  <?!= include('javascript'); ?>
</body>

</html>
