<!DOCTYPE html>
<html lang="ko">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>왕비집 예약관리 시스템 v2.0</title>

  <!-- 1. Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Summernote Lite CDN (Bootstrap 의존성 없는 버전) -->
  <!-- 주의: 이 파일이 로드될 때 jQuery가 없으면 Summernote가 작동하지 않으므로 포함합니다. -->
  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" xintegrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.7/kakao.min.js"
    xintegrity="sha384-tJkjbtDbvoxO+diRuDtwRO9JXR7pjWnfjfRn5ePUpl7e7RJCxKCwwnfqUAdXh53p" crossorigin="anonymous">
  </script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- 2. Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <?!= include('stylesheet'); ?>

  <script>
    // 카카오 초기화 (JavaScript 키)
    try {
      Kakao.init('efe2c8b08309d34649b1790baf497f6b'); 
    } catch(e) { console.warn('Kakao Init Fail'); }
  </script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans text-sm h-screen overflow-hidden">

  <div id="app" class="h-full flex flex-col relative" data-app-url="<?!= BASE_WEBAPP_URL ?>" v-cloak>

    <!-- A. Global Spinner (초기 로딩 & API 요청 중) -->
    <div v-if="isLoading"
      class="absolute inset-0 z-[9999] bg-white bg-opacity-90 flex flex-col items-center justify-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-800 mb-4"></div>
      <p class="text-lg font-bold text-gray-700 animate-pulse">{{ loadingMessage }}</p>
    </div>

    <!-- B. Access Denied Screen (Component) -->
    <div v-else-if="appState === 'denied'" class="h-full">
      <?!= include('ViewDenied'); ?>
    </div>

    <!-- Google One Tap -->
    <div
      id="g_id_onload"
      data-client_id="25112068693-uq5e9eugragj3bpohef0qmh0m0vuifi0.apps.googleusercontent.com"
      data-callback="handleGoogleCredential"
      data-auto_prompt="true">
    </div>

    <!-- C. Authorized App Screen -->
    <div v-else-if="appState === 'authorized'" class="flex-1 flex flex-col h-full overflow-hidden">

      <!-- 1. Header Component -->
      <?!= include('LayoutHeader'); ?>

      <!-- 2. Main Content Area (Tabs) -->
      <main class="flex-1 overflow-y-auto relative bg-gray-100 p-2 md:p-4">

        <!-- View: Reservation List -->
        <div v-show="currentView === 'list'" class="h-full flex flex-col">
          <?!= include('ViewList'); ?>
        </div>

        <!-- View: Calendar -->
        <div v-show="currentView === 'calendar'" class="h-full flex flex-col">
          <?!= include('ViewCalendar'); ?>
        </div>

        <!-- View: Settings (Admin Only) -->
        <div v-show="currentView === 'settings'" class="h-full flex flex-col">
          <?!= include('ViewSettings'); ?>
        </div>

      </main>

      <!-- 3. Modals -->
      <!-- 예약 상세/수정/추가 모달 -->
      <transition name="modal">
        <div v-if="modalState.reservation"
          class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
          <?!= include('ModalReservation'); ?>
        </div>
      </transition>

      <!-- 시스템 설정(유저/지점/슬롯) 모달 -->
      <transition name="modal">
        <div v-if="modalState.system"
          class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
          <?!= include('ModalSystemSettings'); ?>
        </div>
      </transition>

      <!-- 메일 템플릿 편집 모달 -->
      <transition name="modal">
        <div v-if="modalState.mail"
          class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
          <?!= include('ModalMailTemplate'); ?>
        </div>
      </transition>

      <!-- Custom Alert/Confirm -->
      <?!= include('ModalAlert'); ?>

    </div>

  </div>

  <!-- Core Logic -->
  <?!= include('javascript'); ?>
</body>

</html>
