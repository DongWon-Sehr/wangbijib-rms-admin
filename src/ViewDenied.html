<!-- ViewDenied.html (접근 거부 화면) -->
<!-- 이 뷰는 appState === 'denied'일 때 전체 화면을 덮습니다. -->
<div class="h-full flex items-center justify-center p-4 bg-gray-50">
  <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-2xl text-center border-t-4 border-red-800">
    <i class="ph ph-prohibit text-7xl text-red-700 mb-4 mx-auto"></i>
    <h1 class="text-3xl font-extrabold text-gray-900 mb-3">접근 권한이 필요합니다</h1>
    <p class="text-gray-600 mb-6 text-base leading-relaxed">{{ deniedMessage }}</p>
    
    <div class="p-4 bg-red-50 border border-red-200 rounded-lg mb-6">
        <p class="text-sm font-semibold text-red-700">
            <i class="ph ph-envelope-simple text-lg mr-1"></i> 현재 접속 계정: {{ currentUser ? currentUser.user_email : '알 수 없음' }}
        </p>
    </div>

    <a :href="logoutUrl" class="w-full inline-block px-6 py-3 bg-red-800 text-white font-bold rounded-lg hover:bg-red-900 transition shadow-md">
      <i class="ph ph-sign-out mr-2"></i> 다른 계정으로 로그인 시도
    </a>
  </div>
</div>
